{% extends "jobs/base.html" %}

{% block content %}

<h1>Jobs</h1>

<table class="table table-striped table-bordered">

    <thead>

        <tr>
            <th>Title</th>
            <th>Company</th>
            <th>Location</th>
            <th>Type</th>
        </tr>

    </thead>

    <tbody>

        {% for job in jobs_list %}

        <tr>

            <td>{{ job.title }}</td>

            <td>{{ job.company.name }}</td>

            <td>{{ job.location }}</td>

            <td>{{ job.get_job_type_display }}</td>

        </tr>

        {% empty %}

        <tr>
            <td colspan="4">
                No jobs available.
            </td>
        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
