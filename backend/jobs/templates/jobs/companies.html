{% extends "jobs/base.html" %}

{% block content %}

<h1>Companies</h1>

<table class="table table-striped table-bordered">

    <thead>

        <tr>
            <th>ID</th>
            <th>Company Name</th>
            <th>Industry</th>
        </tr>

    </thead>

    <tbody>

        {% for company in companies %}

        <tr>

            <td>{{ company.id }}</td>

            <td>{{ company.name }}</td>

            <td>{{ company.industry }}</td>

        </tr>

        {% empty %}

        <tr>
            <td colspan="3">
                No companies found.
            </td>
        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
